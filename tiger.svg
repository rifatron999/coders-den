           C858,654 852,640 855,618 C858,596 868,572 872,545 
           C876,518 870,492 860,470Z"
        fill="url(#tigerBody)" stroke="#D97706" stroke-width="0.4" stroke-opacity="0.06"/>

  <!-- Rear leg front -->
  <path d="M790,520 C788,545 782,572 775,598 
           C768,624 762,648 760,665 C758,682 762,692 770,695 
           C778,698 784,690 786,678 C788,666 785,650 790,628 
           C795,606 805,580 808,555 C811,530 805,510 798,500Z"
        fill="url(#tigerBody)" stroke="#D97706" stroke-width="0.4" stroke-opacity="0.06"/>

  <!-- Front right leg -->
  <path d="M440,460 C435,485 428,512 422,540 
           C416,568 412,595 410,618 C408,641 412,658 418,668 
