<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <!-- Prowling Tiger Silhouette — facing forward-left, stalking pose -->
  <defs>
    <linearGradient id="tigerGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D97706" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#B45309" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="tigerBody" x1="0%" y1="0%" x2="100%" y2="80%">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.1"/>
      <stop offset="40%" stop-color="#D97706" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#92400E" stop-opacity="0.05"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#D97706" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Body — main torso crouching -->
  <path d="M380,420 C360,390 340,360 330,330 C320,300 330,275 350,260 
           C370,245 400,235 440,230 C480,225 530,228 570,235 
           C610,242 650,255 690,270 C730,285 760,300 790,320 
           C820,340 845,365 860,390 C875,415 880,440 870,465 
           C860,490 840,510 810,525 C780,540 745,548 710,550 
           C675,552 640,548 610,540 C580,532 550,518 520,505 
           C490,492 460,478 435,462 C410,446 395,438 380,420Z"
        fill="url(#tigerBody)" stroke="#D97706" stroke-width="0.5" stroke-opacity="0.08"/>

  <!-- Rear haunches -->
  <path d="M810,525 C830,510 855,500 870,480 
           C885,460 895,440 900,415 C905,390 900,370 890,355 
           C880,340 865,332 850,330 C835,328 820,335 808,348 
           C796,361 790,380 790,400 C790,420 795,445 800,465 
           C805,485 810,505 810,525Z"
        fill="url(#tigerBody)" stroke="#D97706" stroke-width="0.4" stroke-opacity="0.06"/>

  <!-- Rear leg back -->
  <path d="M850,465 C855,490 858,520 855,548 
           C852,576 845,600 838,625 C831,650 828,668 830,680 
