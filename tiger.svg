  <!-- Right ear -->
  <path d="M410,202 C418,182 428,168 438,160 
           C448,152 458,155 462,168 C466,181 460,198 450,212 
           C440,226 430,230 422,218Z"
        fill="url(#tigerBody)" stroke="#D97706" stroke-width="0.4" stroke-opacity="0.08"/>

  <!-- Muzzle / snout -->
  <path d="M340,320 C335,330 332,340 335,348 
           C338,356 345,360 355,358 C365,356 375,352 385,350 
           C395,348 402,352 405,348 C408,344 406,336 400,328 
           C394,320 385,315 375,318 C365,321 352,325 340,320Z"
        fill="url(#tigerBody)" stroke="#D97706" stroke-width="0.3" stroke-opacity="0.08"/>

  <!-- Nose -->
  <ellipse cx="370" cy="338" rx="10" ry="7" fill="#D97706" opacity="0.08"/>

  <!-- Left eye -->
  <ellipse cx="342" cy="272" rx="14" ry="9" fill="url(#eyeGlow)"/>
  <ellipse cx="342" cy="272" rx="3" ry="8" fill="#0A0A0B" opacity="0.4"/>

  <!-- Right eye -->
  <ellipse cx="410" cy="268" rx="14" ry="9" fill="url(#eyeGlow)"/>
  <ellipse cx="410" cy="268" rx="3" ry="8" fill="#0A0A0B" opacity="0.4"/>

  <!-- Tail -->
  <path d="M900,415 C920,400 945,385 965,378 
           C985,371 1005,372 1020,380 C1035,388 1042,402 1040,418 
           C1038,434 1028,448 1015,455 C1002,462 988,460 978,450 
           C968,440 962,425 958,415 C954,405 948,400 940,402"
        fill="none" stroke="#D97706" stroke-width="8" stroke-opacity="0.06" stroke-linecap="round"/>
  <!-- Tail tip -->
  <path d="M1015,455 C1025,465 1040,472 1055,470 
           C1070,468 1080,458 1082,445"
        fill="none" stroke="#D97706" stroke-width="6" stroke-opacity="0.05" stroke-linecap="round"/>

  <!-- Tiger body stripes -->
  <path d="M420,250 C435,270 445,290 448,310" fill="none" stroke="#D97706" stroke-width="3" stroke-opacity="0.06" stroke-linecap="round"/>
  <path d="M470,248 C478,268 482,290 480,312" fill="none" stroke="#D97706" stroke-width="2.5" stroke-opacity="0.05" stroke-linecap="round"/>
  <path d="M520,252 C525,275 522,298 518,320" fill="none" stroke="#D97706" stroke-width="3" stroke-opacity="0.06" stroke-linecap="round"/>
  <path d="M565,262 C568,285 565,310 558,332" fill="none" stroke="#D97706" stroke-width="2.5" stroke-opacity="0.05" stroke-linecap="round"/>
  <path d="M610,275 C612,298 608,322 600,345" fill="none" stroke="#D97706" stroke-width="3" stroke-opacity="0.06" stroke-linecap="round"/>
  <path d="M655,290 C655,315 650,340 640,362" fill="none" stroke="#D97706" stroke-width="2.5" stroke-opacity="0.05" stroke-linecap="round"/>
  <path d="M700,308 C698,332 692,358 682,380" fill="none" stroke="#D97706" stroke-width="3" stroke-opacity="0.06" stroke-linecap="round"/>
  <path d="M740,325 C738,350 732,378 722,400" fill="none" stroke="#D97706" stroke-width="2.5" stroke-opacity="0.05" stroke-linecap="round"/>
  <path d="M780,345 C778,370 772,398 762,422" fill="none" stroke="#D97706" stroke-width="2.5" stroke-opacity="0.05" stroke-linecap="round"/>
  <path d="M820,370 C818,395 812,420 802,442" fill="none" stroke="#D97706" stroke-width="2.5" stroke-opacity="0.04" stroke-linecap="round"/>

  <!-- Head stripes -->
  <path d="M335,225 C340,240 342,255 338,268" fill="none" stroke="#D97706" stroke-width="2" stroke-opacity="0.06" stroke-linecap="round"/>
  <path d="M355,215 C358,232 358,250 352,265" fill="none" stroke="#D97706" stroke-width="2" stroke-opacity="0.06" stroke-linecap="round"/>
  <path d="M395,212 C398,230 400,248 398,265" fill="none" stroke="#D97706" stroke-width="2" stroke-opacity="0.06" stroke-linecap="round"/>
  <path d="M418,218 C420,235 418,252 414,268" fill="none" stroke="#D97706" stroke-width="2" stroke-opacity="0.06" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="340" y1="340" x2="290" y2="332" stroke="#D97706" stroke-width="1" stroke-opacity="0.06"/>
  <line x1="338" y1="348" x2="285" y2="348" stroke="#D97706" stroke-width="1" stroke-opacity="0.06"/>
  <line x1="340" y1="355" x2="292" y2="365" stroke="#D97706" stroke-width="1" stroke-opacity="0.06"/>
  <line x1="402" y1="338" x2="452" y2="328" stroke="#D97706" stroke-width="1" stroke-opacity="0.06"/>
  <line x1="404" y1="346" x2="458" y2="344" stroke="#D97706" stroke-width="1" stroke-opacity="0.06"/>
  <line x1="402" y1="354" x2="455" y2="362" stroke="#D97706" stroke-width="1" stroke-opacity="0.06"/>

  <!-- Ambient glow behind tiger -->
  <ellipse cx="600" cy="420" rx="350" ry="200" fill="url(#tigerGlow)" opacity="0.5"/>
</svg>